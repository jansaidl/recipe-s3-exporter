#yamlPreprocessor=on
# Small Production: single-container app, NON_HA PostgreSQL, one bucket.
#   zerops project import "1 — Small Production/import.yaml"
project:
  name: s3-exporter
  description: Dashboard for exporting Zerops service backups to external S3 storage
  tags:
    - backup
    - exporter

services:
  # The dashboard application (Go), built from this repository.
  - hostname: app
    type: go@1
    zeropsSetup: app
    buildFromGit: https://github.com/jansaidl/recipe-s3-exporter
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
    envSecrets:
      # 32-character master key encrypting all stored secrets at rest (generated).
      MASTER_KEY: <@generateRandomString(<32>)>
      # First admin account, created on first boot. ADMIN_EMAIL is required and
      # prompted on deploy; the password is generated — read it from this
      # service's environment variables afterwards.
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: <@generateRandomString(<16>)>

  # PostgreSQL database for users, tokens, targets, jobs and run history.
  - hostname: db
    type: postgresql@16
    mode: NON_HA

  # A Zerops Object Storage bucket you can use as an export target.
  - hostname: storage
    type: object-storage
    objectStorageSize: 5
